<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Rating / Progressive Enhancement / FDND</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link href="assets/styles.css" rel="stylesheet" />
    <style>
      form {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;

        fieldset {
          border: none;
        }
      }

      .stars {
        display: flex;
        width: fit-content;
      }

      .stars input[type="radio"] {
        position: absolute;
        opacity: 0;
      }

      .stars label {
        display: inline-block;
        width: 2.5rem;
        height: 2.5rem;
        cursor: pointer;
        background-repeat: no-repeat;
        background-size: contain;
        background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><path fill="%2366E5BF" d="M32 12.408l-11.056-1.607-4.944-10.018-4.944 10.018-11.056 1.607 8 7.798-1.889 11.011 9.889-5.199 9.889 5.199-1.889-11.011 8-7.798zM16 23.547l-6.983 3.671 1.334-7.776-5.65-5.507 7.808-1.134 3.492-7.075 3.492 7.075 7.807 1.134-5.65 5.507 1.334 7.776-6.983-3.671z"></path></svg>');

        @media (prefers-reduced-motion: no-preference) {
          transition: transform 0.1s ease;
        }
      }

      .stars label:has(input:focus-visible) {
        outline: 2px solid #000; /* of een andere kleur */
        outline-offset: 4px; /* beetje ruimte rondom de ster */
        border-radius: 4px; /* optioneel, voor mooiere hoeken */
      }

      .stars label:hover,
      .stars label:has(~ label:hover),
      .stars label:has(input:checked),
      .stars label:has(~ label input:checked) {
        background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><path fill="%2366E5BF" d="M32 12.408l-11.056-1.607-4.944-10.018-4.944 10.018-11.056 1.607 8 7.798-1.889 11.011 9.889-5.199 9.889 5.199-1.889-11.011 8-7.798z"></path></svg>');
      }
    </style>
  </head>
  <body>
    <h1>Rating</h1>

    <!-- Dit zijn de SVG's van de sterren. Maar horen die wel in HTML, of is dit eigenlijk styling?

			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
				<path fill="#66E5BF" d="M32 12.408l-11.056-1.607-4.944-10.018-4.944 10.018-11.056 1.607 8 7.798-1.889 11.011 9.889-5.199 9.889 5.199-1.889-11.011 8-7.798zM16 23.547l-6.983 3.671 1.334-7.776-5.65-5.507 7.808-1.134 3.492-7.075 3.492 7.075 7.807 1.134-5.65 5.507 1.334 7.776-6.983-3.671z"></path>
			</svg>

			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
				<path fill="#66E5BF" d="M32 12.408l-11.056-1.607-4.944-10.018-4.944 10.018-11.056 1.607 8 7.798-1.889 11.011 9.889-5.199 9.889 5.199-1.889-11.011 8-7.798z"></path>
			</svg>
		-->

    <!-- Waarschijnlijk wil je je rating ooit opslaan, dus heb je een formulier nodig -->
    <form method="post">
      <fieldset>
        <legend>Beoordeling:</legend>

        <div class="stars">
          <label>
            <input type="radio" name="rating" value="1" />
          </label>
          <label>
            <input type="radio" name="rating" value="2" />
          </label>
          <label>
            <input type="radio" name="rating" value="3" />
          </label>
          <label>
            <input type="radio" name="rating" value="4" />
          </label>
          <label>
            <input type="radio" name="rating" value="5" />
          </label>
        </div>
      </fieldset>
    </form>

    <details open>
      <summary>Demo video</summary>
      <video
        src="assets/rating.mp4"
        width="271"
        height="110"
        controls
        muted
        autoplay
        loop
      >
        <a href="assets/rating.mp4">assets/rating.mp4</a>
      </video>
    </details>
  </body>
</html>
